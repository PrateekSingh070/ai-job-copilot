name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/copilot
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_ci_ci_ci_ci_ci_ci_ci_ci_ci_ci_ci_ci
      JWT_REFRESH_SECRET: cs_cs_cs_cs_cs_cs_cs_cs_cs_cs_cs_cs_cs
      NODE_ENV: test
      VITEST: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Prisma migrate
        working-directory: server
        run: npx prisma migrate deploy
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: E2E
        env:
          CI: "true"
        run: npm run test:e2e

  docker-images:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: docker build -t copilot-api ./server
      - name: Build client image
        run: docker build -t copilot-web ./client
