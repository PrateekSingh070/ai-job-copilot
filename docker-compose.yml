services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "5433:5432"
    volumes:
      - copilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change_me_to_a_32_plus_character_secret_value
      JWT_REFRESH_SECRET: change_me_to_another_32_plus_character_secret_value
      CORS_ORIGIN: http://localhost:8080
      FRONTEND_URL: http://localhost:8080
      SERVER_PUBLIC_URL: http://localhost:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  copilot_pg: {}
