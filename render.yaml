# Render Blueprint: https://render.com/docs/blueprint-spec
# After push to GitHub, connect repo → New Blueprint → select render.yaml.
# Create a Postgres instance with pgvector (e.g. Neon or Supabase) and set DATABASE_URL.
services:
  - type: web
    name: ai-job-copilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SERVER_PUBLIC_URL
        sync: false
      - key: CLIENT_STATIC_DIR
        value: /app/client/dist
      - key: REDIS_URL
        sync: false
      - key: AI_PROVIDER
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
